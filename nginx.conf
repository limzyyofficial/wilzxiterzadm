# ─────────────────────────────────────────────────────────────────────────────
# Nginx config — WilzXiterz
# Save to: /etc/nginx/sites-available/wilzxiterz
# Then: sudo ln -s /etc/nginx/sites-available/wilzxiterz /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    root /var/www/html/well-known;   # ← ganti ke folder project kamu
    index index.php;

    # ── DDoS / rate limiting ──────────────────────────────────────────────────
    # Define rate limit zones (taruh di dalam http {} block di nginx.conf utama)
    # limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    # limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
    # limit_req_zone $binary_remote_addr zone=checkout:10m rate=5r/m;
    # limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # Terapkan rate limit global
    limit_req zone=general burst=20 nodelay;
    limit_conn connlimit 20;

    # ── Static files ──────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Python API (FastAPI via uvicorn) ──────────────────────────────────────
    # api.php → Python
    location = /api.php {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Checkout endpoint — extra strict
    location = /api.php~checkout {
        limit_req zone=checkout burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # vpn_check.php → Python
    location = /vpn_check.php {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000/vpn_check/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── PHP files ─────────────────────────────────────────────────────────────
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # ganti versi PHP sesuai server
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 30;
    }

    # Block akses langsung ke folder data/
    location ^~ /data/ {
        deny all;
        return 403;
    }

    # Block akses ke file .json di root
    location ~* \.json$ {
        deny all;
        return 403;
    }

    # Block dot-files (.htaccess, .git, dll)
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

